<!DOCTYPE html>
<html>
<head>
    <title>Hierarchy Processor</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .container { max-width: 800px; margin: auto; border: 1px solid black; padding: 20px; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        button { padding: 8px 15px; background: black; color: white; cursor: pointer; }
        .error { color: red; font-weight: bold; display: none; }
        .result { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td, th { border: 1px solid #ccc; padding: 5px; }
        .badge { background: #eee; padding: 2px 6px; margin-left: 5px; border: 1px solid black; font-size: 12px; }
        ul { padding-left: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Hierarchy Processor</h3>
        <textarea id="inputBox" placeholder='["A->B","A->C"]'></textarea><br>
        <button onclick="processData()">Submit</button>
        <p id="errorBox" class="error"></p>
        <div id="output" class="result">
            <hr>
            <p><b>Trees:</b> <span id="trees"></span> | <b>Cycles:</b> <span id="cycles"></span> | <b>Largest Root:</b> <span id="largest"></span></p>
            <div id="treeContainer"></div>
            <hr>
            <p><b>Invalid:</b> <span id="invalid"></span><br><b>Duplicates:</b> <span id="duplicates"></span></p>
            <table><tr>
                <td>ID: <span id="uid"></span></td><td>Email: <span id="email"></span></td><td>Roll: <span id="roll"></span></td>
            </tr></table>
        </div>
    </div>
    <script>
        function get(id) { return document.getElementById(id); }
        
        function renderTree(node) {
            let keys = Object.keys(node);
            if (keys.length === 0) return "";
            let html = "<ul>";
            for (let k of keys) html += "<li><b>" + k + "</b>" + renderTree(node[k]) + "</li>";
            return html + "</ul>";
        }

        async function processData() {
            let btn = document.querySelector("button");
            btn.innerText = "Loading...";
            btn.disabled = true;
            get("errorBox").style.display = "none";
            get("output").style.display = "none";
            get("treeContainer").innerHTML = "";

            try {
                let text = get("inputBox").value.trim();
                if (!text) throw "Input cannot be empty";

                let arr = text.startsWith("[") ? JSON.parse(text) : text.split(",").map(x => x.trim());
                let url = (location.hostname === "localhost" || location.protocol === "file:") ? "http://localhost:3000/bfhl" : "/bfhl";
                let response = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ data: arr }) });
                let result = await response.json();
                
                if (!response.ok) throw result.error || "Something went wrong";

                get("uid").innerText = result.user_id;
                get("email").innerText = result.email_id;
                get("roll").innerText = result.college_roll_number;

                get("trees").innerText = result.summary.total_trees;
                get("cycles").innerText = result.summary.total_cycles;
                get("largest").innerText = result.summary.largest_tree_root || "-";

                get("invalid").innerText = result.invalid_entries.join(", ");
                get("duplicates").innerText = result.duplicate_edges.join(", ");

                result.hierarchies.forEach(h => {
                    let block = "<p><b>Root: " + h.root + "</b>";
                    if (h.has_cycle) {
                        block += " <span class='badge'>Cycle</span></p><p>Cycle detected</p>";
                    } else {
                        block += " <span class='badge'>Depth: " + h.depth + "</span></p><ul><li><b>" + h.root + "</b>" + renderTree(h.tree[h.root] || {}) + "</li></ul>";
                    }
                    get("treeContainer").innerHTML += block;
                });

                get("output").style.display = "block";
            } catch (err) {
                get("errorBox").innerText = err;
                get("errorBox").style.display = "block";
            } finally {
                btn.innerText = "Submit";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
